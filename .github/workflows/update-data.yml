name: update wasted-wind data

on:
  schedule:
    - cron: '30 5 * * *'   # every morning, 05:30 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull latest settled days from Elexon
        run: node scripts/update-data.mjs
      - name: Commit if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/wasted-daily.json
          git diff --cached --quiet || { git commit -m "data: daily wasted-wind update"; git push; }
